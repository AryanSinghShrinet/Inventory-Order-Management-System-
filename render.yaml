# =============================================================================
# Render Blueprint: one-click deploy of the Inventory & Order Management
# System. Import this file at https://dashboard.render.com/blueprints.
#
# Provisions:
#   - inventory-postgres: managed PostgreSQL (free tier)
#   - inventory-backend:  FastAPI web service from the backend/ directory
#
# After it deploys, set the backend URL as VITE_API_URL in the Vercel
# project and redeploy the frontend.
# =============================================================================

databases:
  - name: inventory-postgres
    plan: free
    databaseName: inventory
    user: inventory
    ipAllowList: []

services:
  - type: web
    name: inventory-backend
    runtime: docker
    rootDir: backend
    plan: free
    region: oregon
    healthCheckPath: /healthz
    autoDeploy: true
    dockerContext: backend
    dockerfilePath: ./Dockerfile
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: inventory-postgres
          property: connectionString
      - key: CORS_ORIGINS
        value: "*"
      - key: SEED_ON_START
        value: "true"
      - key: LOG_LEVEL
        value: info
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: PORT
        value: "8000"
